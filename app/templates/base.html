<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CollabBoard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#12131a',
            panel: '#191b24',
            panel2: '#20232f',
            line: '#2b2f3d',
            accent: '#7CFFC4',
            accent2: '#8B7CFF',
            warn: '#FF8B6B',
            muted: '#9096AA',
          },
          fontFamily: {
            display: ['"Space Grotesk"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-ink text-slate-100 font-body min-h-screen">
  <nav class="border-b border-line bg-panel/60 backdrop-blur sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/dashboard" class="font-display font-700 text-lg tracking-tight flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-sm bg-accent inline-block"></span>
        CollabBoard
      </a>
      <div id="nav-user" class="text-sm text-muted font-mono"></div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/api.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
