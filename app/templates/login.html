{% extends "base.html" %}
{% block title %}Log in — CollabBoard{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="font-display font-700 text-3xl mb-1">Welcome back</h1>
  <p class="text-muted text-sm mb-8">Log in to your boards.</p>

  <form id="login-form" class="space-y-4">
    <div>
      <label class="text-xs font-mono text-muted uppercase tracking-wide">Email</label>
      <input type="email" id="email" required
        class="w-full mt-1 bg-panel border border-line rounded-lg px-3 py-2 outline-none focus:border-accent" />
    </div>
    <div>
      <label class="text-xs font-mono text-muted uppercase tracking-wide">Password</label>
      <input type="password" id="password" required
        class="w-full mt-1 bg-panel border border-line rounded-lg px-3 py-2 outline-none focus:border-accent" />
    </div>
    <p id="error" class="text-warn text-sm hidden"></p>
    <button type="submit"
      class="w-full bg-accent text-ink font-semibold rounded-lg py-2.5 hover:opacity-90 transition">
      Log in
    </button>
  </form>

  <p class="text-sm text-muted mt-6">No account? <a href="/register" class="text-accent hover:underline">Register</a></p>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  errorEl.classList.add("hidden");

  const body = new URLSearchParams();
  body.set("username", document.getElementById("email").value);
  body.set("password", document.getElementById("password").value);

  try {
    const res = await fetch("/api/auth/login", { method: "POST", body });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Login failed");
    }
    const data = await res.json();
    API.setToken(data.access_token);
    window.location.href = "/dashboard";
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.remove("hidden");
  }
});
</script>
{% endblock %}
