{% extends "base.html" %}
{% block title %}Board — CollabBoard{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 id="board-title" class="font-display font-700 text-2xl">Loading…</h1>
  <div class="flex items-center gap-2 text-xs font-mono text-muted">
    <span id="live-indicator" class="w-2 h-2 rounded-full bg-line"></span>
    <span id="live-text">connecting…</span>
  </div>
</div>

<div id="columns" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
{% endblock %}

{% block scripts %}
<script>
requireAuth();
loadNavUser();

const BOARD_ID = "{{ board_id }}";
let boardData = null;
let ws = null;

function columnHTML(col) {
  return `
    <div class="bg-panel border border-line rounded-xl p-4 flex flex-col" data-column-id="${col.id}">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-medium text-sm uppercase tracking-wide text-muted">${col.name}</h3>
        <span class="text-xs font-mono text-muted">${col.cards.length}</span>
      </div>
      <div class="cards-list space-y-2 min-h-[80px] flex-1" data-column-id="${col.id}"></div>
      <button class="mt-3 text-xs text-accent hover:underline text-left" onclick="promptNewCard('${col.id}')">
        + Add card
      </button>
    </div>
  `;
}

function cardHTML(card) {
  return `
    <div class="bg-panel2 border border-line rounded-lg p-3 cursor-grab hover:border-accent2 transition"
         draggable="true" data-card-id="${card.id}" data-version="${card.version}">
      <div class="text-sm">${escapeHTML(card.title)}</div>
      ${card.description ? `<div class="text-xs text-muted mt-1">${escapeHTML(card.description)}</div>` : ""}
      <button class="text-xs text-warn mt-2 hover:underline" onclick="deleteCard('${card.id}')">delete</button>
    </div>
  `;
}

function escapeHTML(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function render() {
  document.getElementById("board-title").textContent = boardData.name;
  const container = document.getElementById("columns");
  container.innerHTML = boardData.columns.map(columnHTML).join("");

  // wire up drag/drop for each column
  boardData.columns.forEach(col => {
    const listEl = container.querySelector(`.cards-list[data-column-id="${col.id}"]`);
    listEl.innerHTML = col.cards.map(cardHTML).join("");

    listEl.addEventListener("dragover", (e) => {
      e.preventDefault();
      listEl.classList.add("card-drag-over");
    });
    listEl.addEventListener("dragleave", () => listEl.classList.remove("card-drag-over"));
    listEl.addEventListener("drop", async (e) => {
      e.preventDefault();
      listEl.classList.remove("card-drag-over");
      const cardId = e.dataTransfer.getData("text/card-id");
      const version = parseInt(e.dataTransfer.getData("text/version"), 10);
      await handleDrop(cardId, col.id, version, listEl.children.length);
    });
  });

  container.querySelectorAll("[draggable='true']").forEach(cardEl => {
    cardEl.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/card-id", cardEl.dataset.cardId);
      e.dataTransfer.setData("text/version", cardEl.dataset.version);
      cardEl.classList.add("card-dragging");
    });
    cardEl.addEventListener("dragend", () => cardEl.classList.remove("card-dragging"));
  });
}

async function handleDrop(cardId, newColumnId, version, newPosition) {
  try {
    await API.patch(`/api/cards/${cardId}/move`, {
      column_id: newColumnId,
      position: newPosition,
      version: version,
    });
    await loadBoard(); // resync from server (broadcast will also arrive via WS)
  } catch (err) {
    if (err.message.includes("updated by someone else")) {
      alert("This card was just moved by a teammate — refreshing the board.");
    } else {
      alert(err.message);
    }
    await loadBoard();
  }
}

async function promptNewCard(columnId) {
  const title = prompt("Card title:");
  if (!title) return;
  await API.post("/api/cards", { title, column_id: columnId, position: 0 });
  await loadBoard();
}

async function deleteCard(cardId) {
  if (!confirm("Delete this card?")) return;
  await API.del(`/api/cards/${cardId}`);
  await loadBoard();
}

async function loadBoard() {
  boardData = await API.get(`/api/boards/${BOARD_ID}/full`);
  render();
}

function connectWebSocket() {
  const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
  const url = `${protocol}//${window.location.host}/ws/boards/${BOARD_ID}?token=${API.token()}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    document.getElementById("live-indicator").className = "w-2 h-2 rounded-full bg-accent live-dot";
    document.getElementById("live-text").textContent = "live";
  };
  ws.onclose = () => {
    document.getElementById("live-indicator").className = "w-2 h-2 rounded-full bg-warn";
    document.getElementById("live-text").textContent = "disconnected";
    setTimeout(connectWebSocket, 3000); // auto-reconnect
  };
  ws.onmessage = () => {
    // Any board event (create/move/delete) from any user → resync.
    loadBoard();
  };
}

loadBoard();
connectWebSocket();
</script>
{% endblock %}
